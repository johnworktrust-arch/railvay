limit_req_zone $binary_remote_addr zone=ceavpn_sub:10m rate=3r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name sub.79-137-197-51.sslip.io cover.79-137-197-51.sslip.io;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name sub.79-137-197-51.sslip.io;

    ssl_certificate /etc/letsencrypt/live/sub.79-137-197-51.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sub.79-137-197-51.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ceavpn_tls:10m;
    ssl_session_timeout 1d;
    server_tokens off;

    location ^~ /sub/ {
        access_log off;
        limit_req zone=ceavpn_sub burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location / {
        return 404;
    }
}

server {
    listen 127.0.0.1:9443 ssl;
    server_name cover.79-137-197-51.sslip.io;

    ssl_certificate /etc/letsencrypt/live/sub.79-137-197-51.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sub.79-137-197-51.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    access_log off;
    server_tokens off;
    default_type text/html;

    return 200 '<!doctype html><html><head><title>CEA VPN</title></head><body></body></html>';
}
