services:
  - type: web
    name: ceaai-bot
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_BASE_URL
        value: https://ceaai-bot.onrender.com
      - key: TELEGRAM_WEBHOOK_PATH
        value: /telegram/webhook
      - key: MOCK_PAYMENT_BASE_URL
        value: https://mock-payments.local/pay
      - key: DATABASE_URL
        fromDatabase:
          name: ceaai-db
          property: connectionString

databases:
  - name: ceaai-db
    plan: free
    databaseName: ceaai
    user: ceaai
